apiVersion: v1
data:
  db.trabajofinal.local: |
    $TTL 86400

    @   IN  SOA dns.trabajofinal.local. admin.trabajofinal.local. (
            2026061001
            3600
            1800
            604800
            86400
    )

    @       IN NS    dns.trabajofinal.local.

    dns         IN A     10.10.10.10
    cliente1    IN A     10.10.10.20
    cliente2    IN A     10.10.10.30
    impresora1  IN A     10.10.10.40
  named.conf: |
    options {
        directory "/var/cache/bind";

        recursion no;

        allow-query {
            any;
        };
    };

    logging {
        channel query_log {
            file "/var/log/bind/queries.log" versions 5 size 10m;
            severity info;
            print-time yes;
            print-category yes;
            print-severity yes;
        };

        category queries {
            query_log;
        };

        category default {
            query_log;
        };
    };

    zone "trabajofinal.local" IN {
        type master;
        file "/etc/bind/db.trabajofinal.local";
    };
kind: ConfigMap
metadata:
  name: bind9-config
  namespace: dns-ha
