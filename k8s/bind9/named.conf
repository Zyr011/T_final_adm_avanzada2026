options {
    directory "/var/cache/bind";

    recursion no;

    allow-query {
        any;
    };
};

logging {
    channel query_log {
        file "/var/log/bind/queries.log" versions 5 size 10m;
        severity info;
        print-time yes;
        print-category yes;
        print-severity yes;
    };

    category queries {
        query_log;
    };

    category default {
        query_log;
    };
};

zone "trabajofinal.local" IN {
    type master;
    file "/etc/bind/db.trabajofinal.local";
};
