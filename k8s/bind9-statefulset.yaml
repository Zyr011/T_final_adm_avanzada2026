apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bind9
  namespace: dns-ha

spec:
  serviceName: bind9-service
  replicas: 2

  selector:
    matchLabels:
      app: bind9

  template:
    metadata:
      labels:
        app: bind9

    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: bind9
              topologyKey: kubernetes.io/hostname

      containers:
        - name: bind9
          image: internetsystemsconsortium/bind9:9.20
          imagePullPolicy: IfNotPresent

          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP

            - name: dns-tcp
              containerPort: 53
              protocol: TCP

          volumeMounts:
            - name: bind9-config
              mountPath: /etc/bind/named.conf
              subPath: named.conf
              readOnly: true

            - name: bind9-config
              mountPath: /etc/bind/db.trabajofinal.local
              subPath: db.trabajofinal.local
              readOnly: true

            - name: bind9-logs
              mountPath: /var/log/bind

      volumes:
        - name: bind9-config
          configMap:
            name: bind9-config

  volumeClaimTemplates:
    - metadata:
        name: bind9-logs
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
